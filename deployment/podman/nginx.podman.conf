#=========================================================================#
# 404seo — Nginx SSL Reverse Proxy (deploiement Podman)                    #
# Domaine  : seo.404notfood.fr                                            #
#                                                                          #
# Identique au deploiement PM2 : les conteneurs Podman publient leurs     #
# ports sur 127.0.0.1, donc Nginx HestiaCP proxifie vers les MEMES ports :#
#   Next.js (site)  -> http://127.0.0.1:3030                              #
#   Fastify (api)   -> http://127.0.0.1:4000                              #
#                                                                          #
# => Aucun changement d'archi Nginx entre PM2 et Podman. C'est l'interet  #
#    d'avoir publie les ports conteneurs sur la loopback de l'hote.       #
#                                                                          #
# Placer dans HestiaCP :                                                   #
#   /home/seo/conf/web/seo.404notfood.fr/nginx.ssl.conf                    #
# Puis : sudo systemctl reload nginx                                       #
#                                                                          #
# NOTE : adapter l'IP 51.254.138.28 si elle change.                       #
#=========================================================================#

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen      51.254.138.28:80;
    server_name seo.404notfood.fr;

    location /.well-known/acme-challenge/ {
        root /home/seo/web/seo.404notfood.fr/public_html/;
    }

    return 301 https://$host$request_uri;
}

# ── HTTPS ──────────────────────────────────────────────────────────────────────
server {
    listen      51.254.138.28:443 ssl;
    http2       on;
    server_name seo.404notfood.fr;

    ssl_certificate     /home/seo/conf/web/seo.404notfood.fr/ssl/seo.404notfood.fr.pem;
    ssl_certificate_key /home/seo/conf/web/seo.404notfood.fr/ssl/seo.404notfood.fr.key;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Headers de securite ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    access_log /var/log/nginx/domains/seo.404notfood.fr.log combined;
    access_log /var/log/nginx/domains/seo.404notfood.fr.bytes bytes;
    error_log  /var/log/nginx/domains/seo.404notfood.fr.error.log error;

    if ($anti_replay = 307) { return 307 https://$host$request_uri; }
    if ($anti_replay = 425) { return 425; }

    include /home/seo/conf/web/seo.404notfood.fr/nginx.hsts.conf*;

    # ── Fichiers caches ───────────────────────────────────────────────────────
    location ~ /\.(?!well-known\/) {
        deny all;
        return 404;
    }

    # ── Assets statiques Next.js (cache 1 an, hash-busted) ───────────────────
    location ^~ /_next/static/ {
        proxy_pass         http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header         Cache-Control "public, max-age=31536000, immutable";
        access_log         off;
    }

    # ── Auth BetterAuth → Next.js (priorite sur /api/) ────────────────────────
    location ^~ /api/auth/ {
        proxy_pass         http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Stripe webhook → Fastify (body brut, pas de buffering) ───────────────
    location = /api/billing/webhook {
        proxy_pass              http://127.0.0.1:4000;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_read_timeout      60s;
    }

    # ── SSE progression audits → Fastify (long timeout, pas de buffering) ────
    location ~ ^/api/audits/.+/progress$ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # ── API Fastify (toutes les autres routes /api/) ──────────────────────────
    location ^~ /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Next.js (toutes les autres routes) ───────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 60s;
    }

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    client_max_body_size 50M;

    location /vstats/ {
        alias   /home/seo/web/seo.404notfood.fr/stats/;
        include /home/seo/web/seo.404notfood.fr/stats/auth.conf*;
    }

    include /home/seo/conf/web/seo.404notfood.fr/nginx.ssl.conf_*;
}
